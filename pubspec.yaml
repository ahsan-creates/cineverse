name: cineverse
description: A cinematic streaming experience.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  google_sign_in: ^7.2.0
  cloud_firestore: ^6.1.2

  # UI & Theming
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.1

  # HTTP & API
  dio: ^5.9.1

  # UI Components
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^17.1.0

  # Animations
  animations: ^2.1.1

  # UI & Design
  glass_kit: ^4.0.2
  flutter_svg: ^2.2.3

  # Utilities
  shared_preferences: ^2.5.4
  intl: ^0.20.2
  url_launcher: ^6.3.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.10.0
  uuid: ^4.5.3

  # Video Player
  video_player: ^2.11.0
  youtube_player_flutter: ^9.1.3
  
  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons_flutter: ^3.1.9
  envied: ^1.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.3
  freezed: ^3.2.5
  json_serializable: ^6.12.0
  
  # Linting
  flutter_lints: ^6.0.0
  envied_generator: ^1.3.3

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

